<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stage Monitoring Tool</title>
  </head>
  <body>
    <div style="display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; background: white;">
      <div style="background: #f0f0f0; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px;">
        <div style="text-align: center; margin-bottom: 2rem;">
          <h1 style="margin: 0 0 0.5rem 0; color: #212529; font-size: 1.8rem; font-weight: 600;">Stage Monitoring Tool</h1>
          <p style="margin: 0; color: #6c757d; font-size: 0.9rem;">Erasmushogeschool Brussel</p>
        </div>

        <form id="login-form" style="display: flex; flex-direction: column; gap: 1rem;">
          <div>
            <label style="display: block; margin-bottom: 0.5rem; color: #212529; font-weight: 500;">Email</label>
            <input type="email" id="username" placeholder="Voer je email in" required
              style="width: 100%; padding: 0.75rem; border: 1px solid #dee2e6; border-radius: 6px; font-size: 1rem; box-sizing: border-box;" />
          </div>
          <div>
            <label style="display: block; margin-bottom: 0.5rem; color: #212529; font-weight: 500;">Wachtwoord</label>
            <input type="password" id="password" placeholder="Voer je wachtwoord in" required
              style="width: 100%; padding: 0.75rem; border: 1px solid #dee2e6; border-radius: 6px; font-size: 1rem; box-sizing: border-box;" />
          </div>
          <button type="submit"
            style="padding: 0.75rem; background-color: #667eea; color: white; border: none; border-radius: 6px; font-weight: 600; font-size: 1rem; cursor: pointer;">
            Inloggen
          </button>
        </form>

        <div id="login-error" style="margin-top: 1rem; padding: 0.75rem; border-radius: 6px; border: 1px solid transparent; display: none; text-align: center; font-size: 0.9rem;"></div>
      </div>
    </div>

    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>

    <script>
      function redirectNaarRol(role, first_name, last_name) {
        const rolMap = {
          student:       '/student',
          stagecommisie: '/stagecommissie',
          stagementor:   '/stagementor',
          docent:        '/docent',
          admin:         '/'
        };

        toonMelding('success', `✓ Ingelogd als ${role}: ${first_name} ${last_name}`);

        setTimeout(() => {
          window.location.href = rolMap[role] ?? '/';
        }, 1000);
      }

      function toonMelding(type, tekst) {
        const errorDiv = document.getElementById('login-error');
        errorDiv.style.display = 'block';
        errorDiv.textContent = tekst;
        if (type === 'success') {
          errorDiv.style.backgroundColor = '#d1e7dd';
          errorDiv.style.color = '#0f5132';
          errorDiv.style.borderColor = '#badbcc';
        } else {
          errorDiv.style.backgroundColor = '#f8d7da';
          errorDiv.style.color = '#721c24';
          errorDiv.style.borderColor = '#f5c6cb';
        }
      }

      const form = document.getElementById('login-form');
      const emailInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = emailInput.value;
        const password = passwordInput.value;

        fetch('http://localhost:3000/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            sessionStorage.setItem('loggedInUser', data.user.first_name + ' ' + data.user.last_name);
            sessionStorage.setItem('userRole', data.user.role);
            redirectNaarRol(data.user.role, data.user.first_name, data.user.last_name);
          } else {
            toonMelding('error', '✗ Onjuist wachtwoord of email. Probeer opnieuw.');
          }
        })
        .catch(err => {
          toonMelding('error', '✗ Kan geen verbinding maken met de server.');
        });
      });
    </script>
  </body>
</html>
