<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
</head>

<body style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">

  <div style="background:#f0f0f0; padding:30px; border-radius:10px; width:300px;">
    <h2 style="text-align:center;">Login</h2>

    <input id="email" type="email" placeholder="Email"
      style="width:100%; padding:10px; margin-bottom:10px;"><br>

    <input id="password" type="password" placeholder="Password"
      style="width:100%; padding:10px; margin-bottom:10px;"><br>

    <button id="btn" style="width:100%; padding:10px;">Login</button>

    <p id="msg" style="text-align:center;"></p>
  </div>

<script>
const btn = document.getElementById('btn');
const msg = document.getElementById('msg');

// ✅ LOGIN
btn.addEventListener('click', async () => {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('http://localhost:3000/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
      msg.style.color = 'green';
      msg.textContent = "Welkom " + data.user.first_name;

      // ✅ check cookie na login
      checkLogin();

    } else {
      msg.style.color = 'red';
      msg.textContent = data.message;
    }

  } catch (err) {
    msg.style.color = 'red';
    msg.textContent = "Server fout";
  }
});

// ✅ CHECK LOGIN (cookie)
async function checkLogin() {
  try {
    const res = await fetch('http://localhost:3000/me', {
      credentials: 'include'
    });

    const data = await res.json();

    if (data.loggedIn) {
      console.log("✅ Ingelogd:", data.user.first_name);
    } else {
      console.log("❌ Niet ingelogd");
    }
  } catch (err) {
    console.log("Fout bij checkLogin");
  }
}

// ✅ check bij page load
checkLogin();
</script>

</body>
</html>
