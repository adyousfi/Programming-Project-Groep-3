<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Stagemonitoringtool</title>
</head>
<body style="margin:0; font-family:sans-serif;">

  <!-- App container (voor de rol-pagina's) -->
  <div id="app" style="display:none;"></div>

  <!-- Login pagina -->
  <div id="login-page" style="display:none; justify-content:center; align-items:center; height:100vh;">
    <div style="background:#f0f0f0; padding:30px; border-radius:10px; width:300px;">
      <h2 style="text-align:center;">Login</h2>

      <input id="email" type="email" placeholder="Email"
        style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box; border:1px solid #dee2e6; border-radius:6px; font-size:1rem;">

      <input id="password" type="password" placeholder="Wachtwoord"
        style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box; border:1px solid #dee2e6; border-radius:6px; font-size:1rem;">

      <button id="btn"
        style="width:100%; padding:10px; background:#667eea; color:white; border:none; border-radius:6px; font-size:1rem; font-weight:600; cursor:pointer;">
        Login
      </button>

      <p id="msg" style="text-align:center; margin-top:10px;"></p>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
