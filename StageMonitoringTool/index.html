<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
</head>

<body>

  <div id="app"></div>

  <div id="login-page">
    <div class="login-box">
      <h2 class="login-title">Login</h2>

      <input id="email" type="email" placeholder="Email" class="login-input"><br>

      <input id="password" type="password" placeholder="Password" class="login-input"><br>

      <button id="btn" class="login-btn">Login</button>

      <p id="msg" class="login-msg"></p>
    </div>
  </div>

<script type="module" src="/src/main.js"></script>
<script>
const btn = document.getElementById('btn');
const msg = document.getElementById('msg');

// ✅ LOGIN
btn.addEventListener('click', async () => {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
      msg.style.color = 'green';
      msg.textContent = "Welkom " + data.user.first_name;

      // ✅ redirect op basis van rol
      const role = data.user.role;
      if (role) {
        window.location.href = `http://localhost:5173/?role=${encodeURIComponent(role)}`;
      } else {
        checkLogin();
      }

    } else {

      msg.style.color = 'red';
      msg.textContent = data.message;
    }

  } catch (err) {
    msg.style.color = 'red';
    msg.textContent = "Server fout";
  }
});

// ✅ CHECK LOGIN (cookie)
async function checkLogin() {
  try {
    const res = await fetch('/me', {
      credentials: 'include'
    });

    const data = await res.json();

    if (data.loggedIn) {
      console.log("✅ Ingelogd:", data.user.first_name);
    } else {
      console.log("❌ Niet ingelogd");
    }
  } catch (err) {
    console.log("Fout bij checkLogin");
  }
}

// ✅ check bij page load
checkLogin();
</script>

</body>
</html>
