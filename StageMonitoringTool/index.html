<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>stagemonitoringtool</title>
  </head>
  <body style="margin: 0; padding: 0; font-family: sans-serif; background: white; display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <div style="background: #f0f0f0; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px;">

      <h1 style="text-align: center; color: #212529; font-size: 1.8rem; font-weight: 600; margin: 0 0 0.5rem 0;">Welkom terug</h1>
      <p style="text-align: center; color: #6c757d; font-size: 0.9rem; margin: 0 0 2rem 0;">Log in op je account</p>

      <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1rem;">
        <div>
          <label style="display: block; margin-bottom: 0.4rem; color: #212529; font-weight: 500;">E-mailadres</label>
          <input type="email" id="email" placeholder="naam@school.be"
            style="width: 100%; padding: 0.75rem; border: 1px solid #dee2e6; border-radius: 6px; font-size: 1rem; font-family: sans-serif; box-sizing: border-box; background: white; outline: none;">
          <p id="email-error" style="display: none; font-size: 0.8rem; color: #dc3545; margin: 4px 0 0 0;"></p>
        </div>
        <div>
          <label style="display: block; margin-bottom: 0.4rem; color: #212529; font-weight: 500;">Wachtwoord</label>
          <input type="password" id="password" placeholder="••••••••"
            style="width: 100%; padding: 0.75rem; border: 1px solid #dee2e6; border-radius: 6px; font-size: 1rem; font-family: sans-serif; box-sizing: border-box; background: white; outline: none;">
          <p id="password-error" style="display: none; font-size: 0.8rem; color: #dc3545; margin: 4px 0 0 0;"></p>
        </div>
      </div>

      <button id="submit-btn"
        style="width: 100%; padding: 0.75rem; background-color: #667eea; color: white; border: none; border-radius: 6px; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 8px;">
        <span id="btn-text">Inloggen</span>
      </button>

      <div id="melding" style="display: none; margin-top: 1rem; padding: 0.75rem; border-radius: 6px; text-align: center; font-size: 0.9rem;"></div>

    </div>

    <script>
      const emailInput   = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const submitBtn    = document.getElementById('submit-btn');
      const btnText      = document.getElementById('btn-text');
      const melding      = document.getElementById('melding');
      const emailError   = document.getElementById('email-error');
      const passwordError = document.getElementById('password-error');

      function clearErrors() {
        melding.style.display = 'none';
        emailInput.style.borderColor = '#dee2e6';
        passwordInput.style.borderColor = '#dee2e6';
        emailError.style.display = 'none';
        passwordError.style.display = 'none';
      }

      function showFieldError(input, el, msg) {
        input.style.borderColor = '#dc3545';
        el.textContent = msg;
        el.style.display = 'block';
      }

      function showMelding(type, msg) {
        melding.textContent = msg;
        if (type === 'success') {
          melding.style.backgroundColor = '#d1e7dd';
          melding.style.color = '#0f5132';
          melding.style.border = '1px solid #badbcc';
        } else {
          melding.style.backgroundColor = '#f8d7da';
          melding.style.color = '#721c24';
          melding.style.border = '1px solid #f5c6cb';
        }
        melding.style.display = 'block';
      }

      submitBtn.addEventListener('click', async () => {
        clearErrors();
        const email    = emailInput.value.trim();
        const password = passwordInput.value;
        let valid = true;

        if (!email) {
          showFieldError(emailInput, emailError, 'Vul je e-mailadres in.');
          valid = false;
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showFieldError(emailInput, emailError, 'Ongeldig e-mailadres.');
          valid = false;
        }
        if (!password) {
          showFieldError(passwordInput, passwordError, 'Vul je wachtwoord in.');
          valid = false;
        }
        if (!valid) return;

        submitBtn.disabled = true;
        btnText.textContent = 'Bezig...';
        submitBtn.style.opacity = '0.7';
                  
       
        const res = await fetch('http://localhost:3000/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include', // 🔥 BELANGRIJK
          body: JSON.stringify({ email, password })
        });

          const data = await res.json();

          if (data.success) {
            showMelding('success', 'Login succesvol! Welkom, ' + data.user.first_name + '.');
            btnText.textContent = 'Ingelogd';
            submitBtn.style.backgroundColor = '#198754';
            submitBtn.style.opacity = '1';
          } else {
            submitBtn.disabled = false;
            btnText.textContent = 'Inloggen';
            submitBtn.style.opacity = '1';
            showMelding('error', data.message || 'E-mailadres of wachtwoord onjuist.');
            emailInput.style.borderColor = '#dc3545';
            passwordInput.style.borderColor = '#dc3545';
          }
        } catch (err) {
          submitBtn.disabled = false;
          btnText.textContent = 'Inloggen';
          submitBtn.style.opacity = '1';
          showMelding('error', 'Kan geen verbinding maken met de server.');
        }
      });

      [emailInput, passwordInput].forEach(el => el.addEventListener('input', clearErrors));
    </script>

  </body>
</html>
