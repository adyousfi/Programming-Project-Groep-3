<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
</head>

<body>

  <div id="app"></div>

  <div id="login-page" style="display:none">
    <div class="login-card">
      <h1 class="login-title">Stage Monitoring Tool</h1>
      <p class="login-subtitle">Erasmushogeschool Brussel</p>
      <div class="login-field">
        <label class="login-label" for="email">Email</label>
        <input id="email" type="email" placeholder="Voer je e-mailadres in" class="login-input">
      </div>
      <div class="login-field">
        <label class="login-label" for="password">Wachtwoord</label>
        <input id="password" type="password" placeholder="......." class="login-input">
      </div>
      <button id="btn" class="login-btn">Login</button>
      <p id="msg" class="login-msg"></p>
    </div>
  </div>

<script type="module" src="/src/main.js"></script>

</body>
</html>
